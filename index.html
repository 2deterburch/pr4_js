<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Практична робота 4</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<main class="todo-card">
    <h1>To-Do List</h1>
    <p>Додайте завдання, відмічайте виконані та видаляйте непотрібні.</p>

    <div class="input-box">
        <input type="text" id="taskInput" placeholder="Введіть завдання">
        <button id="addTask">Додати</button>
    </div>

    <ul id="taskList"></ul>
</main>

<script src="script.js"></script>
</body>
</html>
